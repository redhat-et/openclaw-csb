version: 1
filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox
network_policies:
  openai_api:
    name: openai-api
    endpoints:
      - host: api.openai.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow:
              method: GET
              path: /v1/models
          - allow:
              method: POST
              path: /v1/responses
          - allow:
              method: POST
              path: /v1/chat/completions
    binaries:
      - path: /usr/bin/node
  github_api:
    name: github-api-readonly
    endpoints:
      - host: api.github.com
        port: 443
        access: read-only
        protocol: rest
        enforcement: enforce
    binaries:
      - path: /usr/bin/curl
