---
# =============================================================================
# OpenClaw on OpenShift — Ansible Deployment Playbook
# File: deploy-openclaw.yml
#
# Usage:
#   # Minimal (AI provider only, no messaging channels):
#   ansible-playbook deploy-openclaw.yml \
#     -e ai_provider=anthropic \
#     -e ai_api_key=sk-ant-...
#
#   # With Telegram enabled:
#   ansible-playbook deploy-openclaw.yml \
#     -e ai_provider=anthropic \
#     -e ai_api_key=sk-ant-... \
#     -e '{"openclaw_channels":{"telegram":{"enabled":true,"bot_token":"7123:AAH..."}}}'
#
#   # With Discord + Vault-encrypted tokens:
#   ansible-playbook deploy-openclaw.yml \
#     -e ai_provider=anthropic \
#     --ask-vault-pass
#   # (set openclaw_channels.discord.enabled: true and vault_discord_bot_token in vars/openclaw.yml)
#
#   # Force rolling restart after image re-tag:
#   ansible-playbook deploy-openclaw.yml \
#     -e ai_provider=anthropic -e ai_api_key=sk-ant-... \
#     -e openclaw_force_restart=true
#
# Prerequisites:
#   ansible-galaxy collection install kubernetes.core
#   pip install kubernetes
#   oc login ... (or KUBECONFIG set)
# =============================================================================

- name: Deploy OpenClaw to OpenShift Sandbox
  hosts: localhost
  connection: local
  gather_facts: true          # needed for ansible_date_time in force-restart

  vars_files:
    - vars/openclaw.yml

  vars:
    # AI provider → env var name
    _api_key_env_var: "{{ _provider_env_map[ai_provider] | default('') }}"

    # Auto-generate gateway token if not provided
    _generated_token: "{{ lookup('password', '/dev/null chars=hexdigits length=64') }}"
    _gateway_token: "{{ openclaw_gateway_token if openclaw_gateway_token | length > 0 else _generated_token }}"

    # Booleans for each channel
    _telegram_enabled:  "{{ openclaw_channels.telegram.enabled          | default(false) | bool }}"
    _discord_enabled:   "{{ openclaw_channels.discord.enabled           | default(false) | bool }}"
    _slack_enabled:     "{{ openclaw_channels.slack.enabled             | default(false) | bool }}"
    _whatsapp_enabled:  "{{ openclaw_channels.whatsapp_business.enabled | default(false) | bool }}"
    _matrix_enabled:    "{{ openclaw_channels.matrix.enabled            | default(false) | bool }}"
    _teams_enabled:     "{{ openclaw_channels.teams.enabled             | default(false) | bool }}"

    _any_channel_enabled: >-
      {{ (_telegram_enabled or _discord_enabled or _slack_enabled
          or _whatsapp_enabled or _matrix_enabled or _teams_enabled) | bool }}

  pre_tasks:
    - name: Validate ai_provider value
      ansible.builtin.assert:
        that:
          - ai_provider in _provider_env_map
        fail_msg: >
          Unknown ai_provider '{{ ai_provider }}'.
          Supported values: {{ _provider_env_map.keys() | list | join(', ') }}

    - name: Validate ai_api_key is not empty
      ansible.builtin.assert:
        that:
          - ai_api_key is defined
          - ai_api_key | length > 0
        fail_msg: "ai_api_key must be set (pass via -e or Ansible Vault)"

    - name: Validate Telegram bot_token
      ansible.builtin.assert:
        that: openclaw_channels.telegram.bot_token | default('') | length > 0
        fail_msg: "openclaw_channels.telegram.bot_token must be set when telegram is enabled"
      when: _telegram_enabled | bool

    - name: Validate Discord bot_token
      ansible.builtin.assert:
        that: openclaw_channels.discord.bot_token | default('') | length > 0
        fail_msg: "openclaw_channels.discord.bot_token must be set when discord is enabled"
      when: _discord_enabled | bool

    - name: Validate Slack tokens
      ansible.builtin.assert:
        that:
          - openclaw_channels.slack.bot_token     | default('') | length > 0
          - openclaw_channels.slack.app_token     | default('') | length > 0
          - openclaw_channels.slack.signing_secret | default('') | length > 0
        fail_msg: "All three Slack tokens (bot_token, app_token, signing_secret) must be set"
      when: _slack_enabled | bool

    - name: Validate WhatsApp Business tokens
      ansible.builtin.assert:
        that:
          - openclaw_channels.whatsapp_business.access_token     | default('') | length > 0
          - openclaw_channels.whatsapp_business.phone_number_id  | default('') | length > 0
          - openclaw_channels.whatsapp_business.verify_token     | default('') | length > 0
        fail_msg: "access_token, phone_number_id, and verify_token are required for WhatsApp Business"
      when: _whatsapp_enabled | bool

    - name: Show deployment summary
      ansible.builtin.debug:
        msg:
          - "Namespace  : {{ openclaw_namespace }}"
          - "Image      : {{ openclaw_image }}"
          - "Provider   : {{ ai_provider }} ({{ _api_key_env_var }})"
          - "Telegram   : {{ _telegram_enabled }}"
          - "Discord    : {{ _discord_enabled }}"
          - "Slack      : {{ _slack_enabled }}"
          - "WhatsApp   : {{ _whatsapp_enabled }}"
          - "Matrix     : {{ _matrix_enabled }}"
          - "Teams      : {{ _teams_enabled }}"

  tasks:

    # -------------------------------------------------------------------------
    # Namespace
    # -------------------------------------------------------------------------
    - name: Ensure namespace exists
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ openclaw_namespace }}"
            labels:
              app.kubernetes.io/managed-by: ansible

    # -------------------------------------------------------------------------
    # Secret — AI provider key + gateway token + all channel tokens
    # All channel tokens are injected as env vars. OpenClaw resolves
    # ${TOKEN_VAR_NAME} references in the channel config JSON at startup.
    # -------------------------------------------------------------------------
    - name: Build channel secret data dict
      ansible.builtin.set_fact:
        _channel_secret_data: >-
          {{
            ({"TELEGRAM_BOT_TOKEN": openclaw_channels.telegram.bot_token}
             if _telegram_enabled | bool else {})
            | combine(
              {"DISCORD_BOT_TOKEN": openclaw_channels.discord.bot_token}
              if _discord_enabled | bool else {}
            )
            | combine(
              {"SLACK_BOT_TOKEN":       openclaw_channels.slack.bot_token,
               "SLACK_APP_TOKEN":       openclaw_channels.slack.app_token,
               "SLACK_SIGNING_SECRET":  openclaw_channels.slack.signing_secret}
              if _slack_enabled | bool else {}
            )
            | combine(
              {"WA_ACCESS_TOKEN":    openclaw_channels.whatsapp_business.access_token,
               "WA_PHONE_NUMBER_ID": openclaw_channels.whatsapp_business.phone_number_id,
               "WA_VERIFY_TOKEN":    openclaw_channels.whatsapp_business.verify_token}
              if _whatsapp_enabled | bool else {}
            )
            | combine(
              {"MATRIX_ACCESS_TOKEN": openclaw_channels.matrix.access_token}
              if _matrix_enabled | bool else {}
            )
            | combine(
              {"TEAMS_APP_ID":        openclaw_channels.teams.app_id,
               "TEAMS_APP_PASSWORD":  openclaw_channels.teams.app_password}
              if _teams_enabled | bool else {}
            )
          }}

    - name: Create/update OpenClaw credentials Secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: openclaw-credentials
            namespace: "{{ openclaw_namespace }}"
            labels:
              app.kubernetes.io/name: openclaw
              app.kubernetes.io/component: credentials
          type: Opaque
          stringData: >-
            {{
              {"OPENCLAW_GATEWAY_TOKEN": _gateway_token,
               _api_key_env_var: ai_api_key}
              | combine(_channel_secret_data)
            }}

    - name: Display generated gateway token (save this!)
      ansible.builtin.debug:
        msg: "OPENCLAW_GATEWAY_TOKEN = {{ _gateway_token }}"
      when: openclaw_gateway_token | length == 0

    # -------------------------------------------------------------------------
    # Channel ConfigMap
    # Contains the channel config structure with ${VAR} placeholders.
    # No actual secrets stored here — those stay in the Secret above.
    # OpenClaw resolves ${ENV_VAR_NAME} at runtime from the injected env vars.
    # -------------------------------------------------------------------------
    - name: Render channel config JSON from template
      ansible.builtin.set_fact:
        _channel_config_json: "{{ lookup('template', 'templates/channels-config.json.j2') }}"
      when: _any_channel_enabled | bool

    - name: Create/update channel config ConfigMap
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: openclaw-channel-config
            namespace: "{{ openclaw_namespace }}"
            labels:
              app.kubernetes.io/name: openclaw
              app.kubernetes.io/component: channel-config
          data:
            channels-config.json: "{{ _channel_config_json }}"
      when: _any_channel_enabled | bool

    - name: Remove channel ConfigMap when no channels are enabled
      kubernetes.core.k8s:
        state: absent
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: openclaw-channel-config
            namespace: "{{ openclaw_namespace }}"
      when: not (_any_channel_enabled | bool)

    # -------------------------------------------------------------------------
    # Custom Skills ConfigMap
    # Each skill's SKILL.md content is stored as a ConfigMap key.
    # An init container on the Deployment copies them into the workspace PVC
    # at skills/<skill-name>/SKILL.md — only if not already present,
    # so skills the agent installs at runtime are not clobbered.
    # -------------------------------------------------------------------------
    - name: Create/update custom skills ConfigMap
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: openclaw-custom-skills
            namespace: "{{ openclaw_namespace }}"
            labels:
              app.kubernetes.io/name: openclaw
              app.kubernetes.io/component: custom-skills
          data: >-
            {{
              dict(openclaw_custom_skills
                | map(attribute='name')
                | zip(openclaw_custom_skills | map(attribute='skill_md')))
            }}
      when: openclaw_custom_skills | default([]) | length > 0

    - name: Remove custom skills ConfigMap when no skills defined
      kubernetes.core.k8s:
        state: absent
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: openclaw-custom-skills
            namespace: "{{ openclaw_namespace }}"
      when: openclaw_custom_skills | default([]) | length == 0

    # -------------------------------------------------------------------------
    # Persistent Volume Claims
    # -------------------------------------------------------------------------
    - name: Create config PVC
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: openclaw-config
            namespace: "{{ openclaw_namespace }}"
            labels:
              app.kubernetes.io/name: openclaw
              app.kubernetes.io/component: config
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: "{{ openclaw_config_pvc_size }}"
            "{{ {} if not openclaw_config_pvc_storage_class else {'storageClassName': openclaw_config_pvc_storage_class} }}"

    - name: Create workspace PVC
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: openclaw-workspace
            namespace: "{{ openclaw_namespace }}"
            labels:
              app.kubernetes.io/name: openclaw
              app.kubernetes.io/component: workspace
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: "{{ openclaw_workspace_pvc_size }}"
            "{{ {} if not openclaw_workspace_pvc_storage_class else {'storageClassName': openclaw_workspace_pvc_storage_class} }}"

    # -------------------------------------------------------------------------
    # Deployment
    # Channel ConfigMap is mounted at /opt/openclaw/channel-config/ (read-only).
    # The entrypoint reads it and applies it via `openclaw config set --batch-json`
    # when OPENCLAW_CHANNEL_CONFIG_PATH is set.
    # -------------------------------------------------------------------------
    - name: Deploy OpenClaw Deployment
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: openclaw
            namespace: "{{ openclaw_namespace }}"
            labels:
              app.kubernetes.io/name: openclaw
              app.kubernetes.io/component: gateway
              app.kubernetes.io/managed-by: ansible
            annotations:
              deployment.kubernetes.io/force-restart: "{{ ansible_date_time.iso8601 if openclaw_force_restart else 'false' }}"
          spec:
            replicas: "{{ openclaw_replicas }}"
            selector:
              matchLabels:
                app.kubernetes.io/name: openclaw
            strategy:
              type: Recreate      # RWO PVCs can only bind to one node
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: openclaw
                  app.kubernetes.io/component: gateway
                annotations:
                  # Changing this hash restarts the pod when channel config changes
                  openclaw/channel-config-hash: >-
                    {{ (_channel_config_json | default('') | hash('sha256'))
                       if _any_channel_enabled else 'none' }}
              spec:
                securityContext:
                  fsGroup: 0
                # ---------------------------------------------------------------
                # Init container: copies custom skills from the ConfigMap into
                # the workspace PVC. Uses --no-clobber so it won't overwrite
                # skills the agent has installed or modified at runtime.
                # Runs as the same UID as the gateway container.
                # ---------------------------------------------------------------
                initContainers:
                  - name: skills-installer
                    image: "{{ openclaw_image }}"
                    imagePullPolicy: Always
                    command:
                      - /bin/bash
                      - -c
                      - |
                        set -euo pipefail
                        SRC=/opt/openclaw/skill-sources
                        DEST=/opt/openclaw/workspace/skills
                        mkdir -p "$DEST"
                        if [ -d "$SRC" ] && [ "$(ls -A $SRC)" ]; then
                          for skill_file in "$SRC"/*.md; do
                            skill_name=$(basename "$skill_file" .md)
                            skill_dir="$DEST/$skill_name"
                            target="$skill_dir/SKILL.md"
                            if [ ! -f "$target" ]; then
                              echo "[skills-installer] Installing skill: $skill_name"
                              mkdir -p "$skill_dir"
                              cp "$skill_file" "$target"
                            else
                              echo "[skills-installer] Skill already present (skipping): $skill_name"
                            fi
                          done
                        else
                          echo "[skills-installer] No custom skills to install."
                        fi
                    securityContext:
                      runAsUser: 1001
                      runAsGroup: 0
                    volumeMounts:
                      - name: workspace
                        mountPath: /opt/openclaw/workspace
                      - name: custom-skills
                        mountPath: /opt/openclaw/skill-sources
                        readOnly: true
                containers:
                  - name: openclaw-gateway
                    image: "{{ openclaw_image }}"
                    imagePullPolicy: Always
                    ports:
                      - name: gateway
                        containerPort: 18789
                        protocol: TCP
                    envFrom:
                      - secretRef:
                          name: openclaw-credentials
                    env:
                      - name: OPENCLAW_CONFIG_DIR
                        value: /opt/openclaw/config
                      - name: OPENCLAW_WORKSPACE_DIR
                        value: /opt/openclaw/workspace
                      - name: OPENCLAW_DISABLE_BONJOUR
                        value: "1"
                      - name: NODE_ENV
                        value: production
                      - name: HOME
                        value: /opt/openclaw
                      # Tells entrypoint.sh where to find the channel config JSON.
                      # Empty string = no channel config to apply.
                      - name: OPENCLAW_CHANNEL_CONFIG_PATH
                        value: "{{ '/opt/openclaw/channel-config/channels-config.json' if _any_channel_enabled else '' }}"
                    resources: "{{ openclaw_resources }}"
                    volumeMounts:
                      - name: config
                        mountPath: /opt/openclaw/config
                      - name: workspace
                        mountPath: /opt/openclaw/workspace
                      - name: channel-config
                        mountPath: /opt/openclaw/channel-config
                        readOnly: true
                    livenessProbe:
                      httpGet:
                        path: /healthz
                        port: gateway
                      initialDelaySeconds: 60
                      periodSeconds: 30
                      failureThreshold: 3
                    readinessProbe:
                      httpGet:
                        path: /healthz
                        port: gateway
                      initialDelaySeconds: 30
                      periodSeconds: 10
                      failureThreshold: 5
                volumes:
                  - name: config
                    persistentVolumeClaim:
                      claimName: openclaw-config
                  - name: workspace
                    persistentVolumeClaim:
                      claimName: openclaw-workspace
                  - name: custom-skills
                    configMap:
                      name: openclaw-custom-skills
                      optional: true    # absent when openclaw_custom_skills is empty
                  - name: channel-config
                    configMap:
                      name: openclaw-channel-config
                      optional: true    # absent when no channels configured

    # -------------------------------------------------------------------------
    # Service
    # -------------------------------------------------------------------------
    - name: Create OpenClaw Service
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: openclaw
            namespace: "{{ openclaw_namespace }}"
            labels:
              app.kubernetes.io/name: openclaw
          spec:
            selector:
              app.kubernetes.io/name: openclaw
            ports:
              - name: gateway
                port: 18789
                targetPort: gateway
                protocol: TCP

    # -------------------------------------------------------------------------
    # Route
    # Edge TLS at the OpenShift router; plain HTTP inside the cluster.
    # WhatsApp Business webhook must point to this Route's HTTPS hostname.
    # -------------------------------------------------------------------------
    - name: Create OpenClaw Route
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: route.openshift.io/v1
          kind: Route
          metadata:
            name: openclaw
            namespace: "{{ openclaw_namespace }}"
            labels:
              app.kubernetes.io/name: openclaw
          spec:
            to:
              kind: Service
              name: openclaw
            port:
              targetPort: gateway
            tls:
              termination: edge
              insecureEdgeTerminationPolicy: Redirect

    # -------------------------------------------------------------------------
    # Post-deploy: print access info and next steps
    # -------------------------------------------------------------------------
    - name: Retrieve Route hostname
      kubernetes.core.k8s_info:
        api_version: route.openshift.io/v1
        kind: Route
        name: openclaw
        namespace: "{{ openclaw_namespace }}"
      register: _openclaw_route

    - name: Set route hostname fact
      ansible.builtin.set_fact:
        _route_host: "{{ _openclaw_route.resources[0].spec.host | default('(route not ready yet)') }}"

    - name: Print access information
      ansible.builtin.debug:
        msg:
          - "=== OpenClaw deployment complete ==="
          - "Control UI  : https://{{ _route_host }}"
          - "Provider    : {{ ai_provider }} ({{ _api_key_env_var }})"
          - "Namespace   : {{ openclaw_namespace }}"
          - ""
          - "Channels deployed:"
          - "  Telegram  : {{ _telegram_enabled }}"
          - "  Discord   : {{ _discord_enabled }}"
          - "  Slack     : {{ _slack_enabled }}"
          - "  WhatsApp  : {{ _whatsapp_enabled }}"
          - "  Matrix    : {{ _matrix_enabled }}"
          - "  Teams     : {{ _teams_enabled }}"
          - ""
          - "{{ '⚠️  WhatsApp webhook: https://' + _route_host + '/webhook/whatsapp' if _whatsapp_enabled | bool else '' }}"
          - "{{ '   Register this URL in the Meta Developer Portal → Webhooks.' if _whatsapp_enabled | bool else '' }}"
          - ""
          - "Complete channel pairing (approve first-contact pairing codes):"
          - "  oc exec -n {{ openclaw_namespace }} deploy/openclaw -- \\"
          - "    node dist/index.js pairing list"
          - ""
          - "Retrieve gateway token:"
          - "  oc get secret openclaw-credentials -n {{ openclaw_namespace }} \\"
          - "    -o jsonpath='{.data.OPENCLAW_GATEWAY_TOKEN}' | base64 -d"
