<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160" role="img" aria-label="OpenClaw on OpenShift logo">
  <title>OpenClaw on OpenShift</title>

  <!-- Background -->
  <rect width="640" height="160" rx="10" fill="#0D1117"/>

  <!-- Subtle hex-grid texture (very faint dots) -->
  <g fill="#1A2133" opacity="0.5">
    <circle cx="320" cy="20"  r="1.2"/><circle cx="360" cy="20"  r="1.2"/><circle cx="400" cy="20"  r="1.2"/>
    <circle cx="440" cy="20"  r="1.2"/><circle cx="480" cy="20"  r="1.2"/><circle cx="520" cy="20"  r="1.2"/>
    <circle cx="560" cy="20"  r="1.2"/><circle cx="600" cy="20"  r="1.2"/>
    <circle cx="340" cy="40"  r="1.2"/><circle cx="380" cy="40"  r="1.2"/><circle cx="420" cy="40"  r="1.2"/>
    <circle cx="460" cy="40"  r="1.2"/><circle cx="500" cy="40"  r="1.2"/><circle cx="540" cy="40"  r="1.2"/>
    <circle cx="580" cy="40"  r="1.2"/><circle cx="620" cy="40"  r="1.2"/>
    <circle cx="320" cy="60"  r="1.2"/><circle cx="360" cy="60"  r="1.2"/><circle cx="400" cy="60"  r="1.2"/>
    <circle cx="440" cy="60"  r="1.2"/><circle cx="480" cy="60"  r="1.2"/><circle cx="520" cy="60"  r="1.2"/>
    <circle cx="560" cy="60"  r="1.2"/><circle cx="600" cy="60"  r="1.2"/>
    <circle cx="340" cy="80"  r="1.2"/><circle cx="380" cy="80"  r="1.2"/><circle cx="420" cy="80"  r="1.2"/>
    <circle cx="460" cy="80"  r="1.2"/><circle cx="500" cy="80"  r="1.2"/><circle cx="540" cy="80"  r="1.2"/>
    <circle cx="580" cy="80"  r="1.2"/><circle cx="620" cy="80"  r="1.2"/>
    <circle cx="320" cy="100" r="1.2"/><circle cx="360" cy="100" r="1.2"/><circle cx="400" cy="100" r="1.2"/>
    <circle cx="440" cy="100" r="1.2"/><circle cx="480" cy="100" r="1.2"/><circle cx="520" cy="100" r="1.2"/>
    <circle cx="560" cy="100" r="1.2"/><circle cx="600" cy="100" r="1.2"/>
    <circle cx="340" cy="120" r="1.2"/><circle cx="380" cy="120" r="1.2"/><circle cx="420" cy="120" r="1.2"/>
    <circle cx="460" cy="120" r="1.2"/><circle cx="500" cy="120" r="1.2"/><circle cx="540" cy="120" r="1.2"/>
    <circle cx="580" cy="120" r="1.2"/><circle cx="620" cy="120" r="1.2"/>
    <circle cx="320" cy="140" r="1.2"/><circle cx="360" cy="140" r="1.2"/><circle cx="400" cy="140" r="1.2"/>
    <circle cx="440" cy="140" r="1.2"/><circle cx="480" cy="140" r="1.2"/><circle cx="520" cy="140" r="1.2"/>
    <circle cx="560" cy="140" r="1.2"/><circle cx="600" cy="140" r="1.2"/>
  </g>

  <!-- === ICON MARK (centered at 80,80, r=64) === -->

  <!-- Outer glow rings (faked with stacked circles) -->
  <circle cx="80" cy="80" r="62" fill="none" stroke="#EE0000" stroke-width="10" opacity="0.08"/>
  <circle cx="80" cy="80" r="62" fill="none" stroke="#EE0000" stroke-width="6"  opacity="0.14"/>

  <!-- Icon backing circle -->
  <circle cx="80" cy="80" r="60" fill="#121829"/>

  <!-- Main ring -->
  <circle cx="80" cy="80" r="60" fill="none" stroke="#EE0000" stroke-width="3.5"/>

  <!-- Secondary inner ring (subtle) -->
  <circle cx="80" cy="80" r="52" fill="none" stroke="#EE0000" stroke-width="0.6" opacity="0.25"/>

  <!-- Ring nodes at compass points (OpenShift orbital aesthetic) -->
  <circle cx="80"  cy="20"  r="5.5" fill="#EE0000"/>
  <circle cx="140" cy="80"  r="5.5" fill="#EE0000"/>
  <circle cx="80"  cy="140" r="5.5" fill="#EE0000"/>
  <circle cx="20"  cy="80"  r="5.5" fill="#EE0000"/>

  <!-- Small connector stubs on ring (between nodes) -->
  <circle cx="123" cy="37" r="2.5" fill="#EE0000" opacity="0.5"/>
  <circle cx="123" cy="123" r="2.5" fill="#EE0000" opacity="0.5"/>
  <circle cx="37"  cy="37" r="2.5" fill="#EE0000" opacity="0.5"/>
  <circle cx="37"  cy="123" r="2.5" fill="#EE0000" opacity="0.5"/>

  <!-- Clip path so claw lines stay inside ring -->
  <defs>
    <clipPath id="ring-clip">
      <circle cx="80" cy="80" r="54"/>
    </clipPath>
  </defs>

  <!-- === THREE CLAW MARKS (parallel diagonals, lower-left to upper-right) === -->
  <g clip-path="url(#ring-clip)">
    <!-- Left mark (thinner, slightly transparent) -->
    <line x1="50" y1="122" x2="84" y2="37"
          stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
    <!-- Center mark (thickest, full opacity) -->
    <line x1="66" y1="124" x2="100" y2="38"
          stroke="#FFFFFF" stroke-width="3.8" stroke-linecap="round"/>
    <!-- Right mark (medium, slightly transparent) -->
    <line x1="82" y1="122" x2="116" y2="37"
          stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
  </g>

  <!-- === DIVIDER === -->
  <line x1="155" y1="22" x2="155" y2="138" stroke="#1E2540" stroke-width="1"/>

  <!-- === TEXT SECTION === -->

  <!-- "OpenClaw" wordmark -->
  <text x="172" y="76"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="50" font-weight="700" fill="#FFFFFF" letter-spacing="-2">OpenClaw</text>

  <!-- "on OpenShift" subtitle -->
  <text x="175" y="110"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="26" font-weight="400" fill="#EE0000" letter-spacing="0.3">on OpenShift</text>

  <!-- Tagline -->
  <text x="175" y="135"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="11.5" font-weight="400" fill="#3D4A5C" letter-spacing="2">
    UBI 10  ·  ANSIBLE DEPLOYED  ·  RESTRICTED SCC
  </text>

  <!-- Red Hat red accent bar on left edge -->
  <rect x="0" y="0" width="3" height="160" rx="1.5" fill="#EE0000" opacity="0.7"/>

</svg>
