# =============================================================================
# OpenClaw CSB — GitHub Actions CI/CD
#
# Builds the agentic base image and CSB OpenClaw image for amd64 + arm64.
# Uses docker build (not buildah) for higher ulimits during compilation.
#
# Secrets required:
#   QUAY_USERNAME   — Quay.io robot account for redhat-et org
#   QUAY_PASSWORD   — Quay.io robot account token
#
# Repositories:
#   quay.io/redhat-et/openshell  — base agentic image
#   quay.io/redhat-et/openclaw   — CSB OpenClaw image
# =============================================================================

name: Build & Push

on:
  push:
    branches: [main]
    paths:
      - base/**
      - csb/**
      - .github/workflows/build.yml
  pull_request:
    branches: [main]
    paths:
      - base/**
      - csb/**
      - .github/workflows/build.yml
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Force rebuild even if upstream OpenClaw is unchanged"
        required: false
        type: boolean
        default: false
      openclaw_ref:
        description: "OpenClaw git ref to build (branch / tag / SHA)"
        required: false
        default: ""
      openclaw_extensions:
        description: "Comma-separated extensions to include. Leave empty for all bundled."
        required: false
        default: ""

permissions:
  contents: read

env:
  BASE_IMAGE_REF: quay.io/redhat-et/openshell
  CSB_IMAGE_REF:  quay.io/redhat-et/openclaw

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # =========================================================================
  # JOB 1 — Upstream version check
  # =========================================================================
  upstream:
    name: Check upstream version
    runs-on: ubuntu-latest
    outputs:
      openclaw_version: ${{ steps.openclaw.outputs.version }}
      should_build:     ${{ steps.decision.outputs.should_build }}
      build_date:       ${{ steps.buildmeta.outputs.date }}
      short_sha:        ${{ steps.buildmeta.outputs.short_sha }}

    steps:
      - name: Fetch latest OpenClaw release tag
        id: openclaw
        run: |
          VERSION=$(curl -sf \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/openclaw/openclaw/releases/latest \
            | jq -r '.tag_name // "unknown"')
          echo "version=${VERSION}" | tee -a "${GITHUB_OUTPUT}"

      - name: Read version label from current Quay image
        id: quay
        run: |
          if INSPECT=$(skopeo inspect --no-creds \
               docker://${{ env.CSB_IMAGE_REF }}:csb-latest 2>/dev/null); then
            CURRENT=$(echo "${INSPECT}" \
              | jq -r '.Labels["org.opencontainers.image.version"] // "none"')
          else
            CURRENT="none"
          fi
          echo "current=${CURRENT}" | tee -a "${GITHUB_OUTPUT}"

      - name: Compute build metadata
        id: buildmeta
        run: |
          echo "date=$(date -u +%Y.%m.%d)" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${GITHUB_SHA::8}" >> "${GITHUB_OUTPUT}"

      - name: Decide whether to build
        id: decision
        env:
          TRIGGER:   ${{ github.event_name }}
          FORCE:     ${{ inputs.force_rebuild }}
          UPSTREAM:  ${{ steps.openclaw.outputs.version }}
          CURRENT:   ${{ steps.quay.outputs.current }}
        run: |
          if [[ "${TRIGGER}" != "schedule" ]]; then
            echo "should_build=true" >> "${GITHUB_OUTPUT}"
          elif [[ "${FORCE}" == "true" ]]; then
            echo "should_build=true" >> "${GITHUB_OUTPUT}"
          elif [[ "${UPSTREAM}" != "${CURRENT}" ]]; then
            echo "should_build=true" >> "${GITHUB_OUTPUT}"
          else
            echo "should_build=false" >> "${GITHUB_OUTPUT}"
          fi

  # =========================================================================
  # JOB 2 — Build agentic base image
  # =========================================================================
  base:
    name: "base-${{ matrix.arch }}"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    needs: upstream
    if: needs.upstream.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to Quay.io
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.QUAY_PASSWORD }}" | docker login -u "${{ secrets.QUAY_USERNAME }}" --password-stdin quay.io

      - name: Build base image
        env:
          DATE: ${{ needs.upstream.outputs.build_date }}
          SHA: ${{ needs.upstream.outputs.short_sha }}
        run: |
          BASE="${{ env.BASE_IMAGE_REF }}"
          ARCH="${{ matrix.arch }}"

          docker build \
            -f base/Containerfile \
            -t "${BASE}:base-${ARCH}-${DATE}" \
            -t "${BASE}:base-${ARCH}-git-${SHA}" \
            base/context

          if [[ "${{ github.ref }}" == "refs/heads/main" ]] || \
             [[ "${{ github.event_name }}" == "schedule" ]]; then
            docker tag "${BASE}:base-${ARCH}-${DATE}" "${BASE}:base-${ARCH}-latest"
          fi

      - name: Push base image
        if: github.event_name != 'pull_request'
        env:
          DATE: ${{ needs.upstream.outputs.build_date }}
          SHA: ${{ needs.upstream.outputs.short_sha }}
        run: |
          BASE="${{ env.BASE_IMAGE_REF }}"
          ARCH="${{ matrix.arch }}"

          docker push "${BASE}:base-${ARCH}-${DATE}"
          docker push "${BASE}:base-${ARCH}-git-${SHA}"

          if docker image inspect "${BASE}:base-${ARCH}-latest" >/dev/null 2>&1; then
            docker push "${BASE}:base-${ARCH}-latest"
          fi

  # =========================================================================
  # JOB 3 — Build CSB OpenClaw image
  # =========================================================================
  build:
    name: "csb-${{ matrix.arch }}"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    needs: [upstream, base]
    if: needs.upstream.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Free runner disk space
        run: |
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/local/share/chromium \
            /usr/local/share/powershell \
            /usr/share/dotnet \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune -af 2>/dev/null || true

      - name: Log in to Quay.io
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.QUAY_PASSWORD }}" | docker login -u "${{ secrets.QUAY_USERNAME }}" --password-stdin quay.io

      - name: Compute tags
        id: meta
        env:
          OC_VERSION: ${{ needs.upstream.outputs.openclaw_version }}
          OC_REF: ${{ inputs.openclaw_ref || needs.upstream.outputs.openclaw_version || 'main' }}
        run: |
          SHORT_SHA="${{ needs.upstream.outputs.short_sha }}"
          DATE="${{ needs.upstream.outputs.build_date }}"
          BASE="${{ env.CSB_IMAGE_REF }}"
          PREFIX="csb-${{ matrix.arch }}-"
          REF_OVERRIDE="${{ inputs.openclaw_ref }}"

          TAGS="${BASE}:${PREFIX}${DATE} ${BASE}:${PREFIX}git-${SHORT_SHA}"

          if [[ -z "${REF_OVERRIDE}" ]] && \
             { [[ "${{ github.ref }}" == "refs/heads/main" ]] || \
               [[ "${{ github.event_name }}" == "schedule" ]]; }; then
            TAGS="${TAGS} ${BASE}:${PREFIX}latest"
          fi

          if [[ -z "${REF_OVERRIDE}" ]] && \
             [[ "${OC_VERSION}" != "unknown" && -n "${OC_VERSION}" ]]; then
            TAGS="${TAGS} ${BASE}:${PREFIX}openclaw-${OC_VERSION}"
          fi

          echo "tags=${TAGS}" >> "${GITHUB_OUTPUT}"
          echo "oc_ref=${OC_REF}" >> "${GITHUB_OUTPUT}"
          echo "oc_version=${OC_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "date=${DATE}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "primary_tag=${BASE}:${PREFIX}${DATE}" >> "${GITHUB_OUTPUT}"

      - name: Build CSB image
        run: |
          TAG_ARGS=""
          for TAG in ${{ steps.meta.outputs.tags }}; do
            TAG_ARGS="${TAG_ARGS} -t ${TAG}"
          done

          EXTENSIONS="${{ inputs.openclaw_extensions }}"
          EXT_ARG=""
          if [ -n "${EXTENSIONS}" ]; then
            EXT_ARG="--build-arg OPENCLAW_EXTENSIONS=${EXTENSIONS}"
          fi

          docker build \
            -f csb/Containerfile \
            --build-arg OPENCLAW_REF=${{ steps.meta.outputs.oc_ref }} \
            --build-arg CSB_BASE_IMAGE=${{ env.BASE_IMAGE_REF }}:base-${{ matrix.arch }}-latest \
            ${EXT_ARG} \
            --label org.opencontainers.image.title="OpenClaw CSB" \
            --label org.opencontainers.image.revision=${{ github.sha }} \
            --label org.opencontainers.image.version=${{ steps.meta.outputs.oc_version }} \
            --label org.opencontainers.image.created=${{ steps.meta.outputs.date }} \
            ${TAG_ARGS} \
            .

      - name: Push CSB image
        id: push
        if: github.event_name != 'pull_request'
        run: |
          for TAG in ${{ steps.meta.outputs.tags }}; do
            docker push "${TAG}"
          done

          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ steps.meta.outputs.primary_tag }} 2>/dev/null | cut -d@ -f2)
          echo "digest=${DIGEST}" >> "${GITHUB_OUTPUT}"

      # --- Trivy ---
      - name: Install Trivy
        if: github.event_name != 'pull_request'
        env:
          TRIVY_VERSION: "0.72.0"
        run: |
          ARCH=$(uname -m)
          case "${ARCH}" in
            x86_64)  TRIVY_ARCH="Linux-64bit" ;;
            aarch64) TRIVY_ARCH="Linux-ARM64" ;;
          esac
          curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_${TRIVY_ARCH}.tar.gz" \
            -o trivy.tar.gz
          tar xzf trivy.tar.gz -C /usr/local/bin trivy
          rm trivy.tar.gz

      - name: Trivy scan
        id: trivy
        if: github.event_name != 'pull_request'
        run: |
          OUT="trivy"
          mkdir -p "${OUT}"
          trivy image --format json --output "${OUT}/csb-${{ matrix.arch }}-trivy.json" \
            "${{ steps.meta.outputs.primary_tag }}" || true
          trivy image --format sarif --output "${OUT}/csb-${{ matrix.arch }}-trivy.sarif" \
            "${{ steps.meta.outputs.primary_tag }}" || true
          echo "trivy_dir=${OUT}" >> "${GITHUB_OUTPUT}"

      - name: Upload Trivy report
        if: github.event_name != 'pull_request' && always() && steps.trivy.outputs.trivy_dir != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: trivy-csb-${{ matrix.arch }}
          path: ${{ steps.trivy.outputs.trivy_dir }}/
          if-no-files-found: error
          retention-days: 90

      - name: Trivy CRITICAL gate
        if: github.event_name != 'pull_request'
        run: trivy image --severity CRITICAL --exit-code 1 "${{ steps.meta.outputs.primary_tag }}"

      # --- SBOM ---
      - name: Install syft
        if: github.event_name != 'pull_request'
        env:
          SYFT_VERSION: "1.46.0"
        run: |
          ARCH=$(uname -m)
          case "${ARCH}" in
            x86_64)  SYFT_ARCH="amd64" ;;
            aarch64) SYFT_ARCH="arm64" ;;
          esac
          curl -sSfL "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_${SYFT_ARCH}.tar.gz" \
            -o syft.tar.gz
          tar xzf syft.tar.gz -C /usr/local/bin syft
          rm syft.tar.gz

      - name: Generate SBOMs
        id: sbom
        if: github.event_name != 'pull_request'
        run: |
          OUT="sbom"
          mkdir -p "${OUT}"
          syft "${{ steps.meta.outputs.primary_tag }}" -o spdx-json > "${OUT}/csb-${{ matrix.arch }}-sbom.spdx.json"
          syft "${{ steps.meta.outputs.primary_tag }}" -o cyclonedx-json > "${OUT}/csb-${{ matrix.arch }}-sbom.cyclonedx.json"
          echo "sbom_dir=${OUT}" >> "${GITHUB_OUTPUT}"

      - name: Upload SBOMs
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-csb-${{ matrix.arch }}
          path: ${{ steps.sbom.outputs.sbom_dir }}/
          retention-days: 90

  # =========================================================================
  # JOB 4 — Multi-arch manifests
  # =========================================================================
  manifest:
    name: Create multi-arch manifests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [upstream, build]
    if: github.event_name != 'pull_request' && needs.upstream.outputs.should_build == 'true'

    steps:
      - name: Log in to Quay.io
        run: echo "${{ secrets.QUAY_PASSWORD }}" | docker login -u "${{ secrets.QUAY_USERNAME }}" --password-stdin quay.io

      - name: Create manifests
        env:
          BASE: ${{ env.BASE_IMAGE_REF }}
          CSB: ${{ env.CSB_IMAGE_REF }}
          DATE: ${{ needs.upstream.outputs.build_date }}
          SHORT_SHA: ${{ needs.upstream.outputs.short_sha }}
          OC_VERSION: ${{ needs.upstream.outputs.openclaw_version }}
        run: |
          create_manifest() {
            local REPO="$1" TAG="$2"
            echo "Creating manifest: ${REPO}:${TAG}"
            docker manifest create "${REPO}:${TAG}" \
              "${REPO}:${TAG%%-*}-amd64-${TAG##*-}" 2>/dev/null || \
            docker manifest create "${REPO}:${TAG}" \
              --amend "${REPO}:${TAG/csb-/csb-amd64-}" \
              --amend "${REPO}:${TAG/csb-/csb-arm64-}" 2>/dev/null || true
            docker manifest push "${REPO}:${TAG}" 2>/dev/null || true
          }

          # Base manifests
          docker manifest create "${BASE}:base-latest" \
            "${BASE}:base-amd64-latest" "${BASE}:base-arm64-latest"
          docker manifest push "${BASE}:base-latest"

          docker manifest create "${BASE}:base-${DATE}" \
            "${BASE}:base-amd64-${DATE}" "${BASE}:base-arm64-${DATE}"
          docker manifest push "${BASE}:base-${DATE}"

          # CSB manifests
          docker manifest create "${CSB}:csb-${DATE}" \
            "${CSB}:csb-amd64-${DATE}" "${CSB}:csb-arm64-${DATE}"
          docker manifest push "${CSB}:csb-${DATE}"

          docker manifest create "${CSB}:csb-git-${SHORT_SHA}" \
            "${CSB}:csb-amd64-git-${SHORT_SHA}" "${CSB}:csb-arm64-git-${SHORT_SHA}"
          docker manifest push "${CSB}:csb-git-${SHORT_SHA}"

          if [[ "${{ github.ref }}" == "refs/heads/main" ]] || \
             [[ "${{ github.event_name }}" == "schedule" ]]; then
            docker manifest create "${CSB}:csb-latest" \
              "${CSB}:csb-amd64-latest" "${CSB}:csb-arm64-latest"
            docker manifest push "${CSB}:csb-latest"
          fi

          if [[ "${OC_VERSION}" != "unknown" && -n "${OC_VERSION}" ]]; then
            docker manifest create "${CSB}:csb-openclaw-${OC_VERSION}" \
              "${CSB}:csb-amd64-openclaw-${OC_VERSION}" "${CSB}:csb-arm64-openclaw-${OC_VERSION}"
            docker manifest push "${CSB}:csb-openclaw-${OC_VERSION}"
          fi
