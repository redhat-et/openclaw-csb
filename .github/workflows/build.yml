# =============================================================================
# OpenClaw CSB — GitHub Actions CI/CD
#
# Builds the agentic base image and CSB OpenClaw image for amd64 + arm64.
# Base image is built first, then CSB layers OpenClaw on top.
#
# Triggers:
#   push to main     → always build + push
#   pull_request     → build only (no push), posts result as check
#   schedule (2 AM)  → checks upstream OpenClaw for new release nightly
#   workflow_dispatch → manual trigger with optional overrides
#
# Secrets required (Settings → Secrets → Actions):
#   QUAY_USERNAME   — Quay.io robot account for redhat-et org
#   QUAY_PASSWORD   — Quay.io robot account token
#
# Repositories:
#   quay.io/redhat-et/openshell  — base agentic image
#   quay.io/redhat-et/openclaw   — CSB OpenClaw image
# =============================================================================

name: Build & Push

on:
  push:
    branches: [main]
    paths:
      - base/**
      - csb/**
      - .github/workflows/build.yml
  pull_request:
    branches: [main]
    paths:
      - base/**
      - csb/**
      - .github/workflows/build.yml
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Force rebuild even if upstream OpenClaw is unchanged"
        required: false
        type: boolean
        default: false
      openclaw_ref:
        description: "OpenClaw git ref to build (branch / tag / SHA)"
        required: false
        default: ""
      openclaw_extensions:
        description: "Comma-separated extensions to include. Leave empty for all bundled."
        required: false
        default: ""

permissions:
  contents: read

env:
  REGISTRY:       quay.io
  BASE_IMAGE_REF: quay.io/redhat-et/openshell
  CSB_IMAGE_REF:  quay.io/redhat-et/openclaw

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # =========================================================================
  # JOB 1 — Upstream version check + build metadata
  # =========================================================================
  upstream:
    name: Check upstream version
    runs-on: ubuntu-latest
    outputs:
      openclaw_version: ${{ steps.openclaw.outputs.version }}
      should_build:     ${{ steps.decision.outputs.should_build }}
      build_date:       ${{ steps.buildmeta.outputs.date }}
      short_sha:        ${{ steps.buildmeta.outputs.short_sha }}

    steps:
      - name: Fetch latest OpenClaw release tag
        id: openclaw
        run: |
          VERSION=$(curl -sf \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/openclaw/openclaw/releases/latest \
            | jq -r '.tag_name // "unknown"')
          echo "version=${VERSION}" | tee -a "${GITHUB_OUTPUT}"

      - name: Read version label from current Quay image
        id: quay
        run: |
          if INSPECT=$(skopeo inspect --no-creds \
               docker://${{ env.CSB_IMAGE_REF }}:csb-latest 2>/dev/null); then
            CURRENT=$(echo "${INSPECT}" \
              | jq -r '.Labels["org.opencontainers.image.version"] // "none"')
          else
            CURRENT="none"
          fi
          echo "current=${CURRENT}" | tee -a "${GITHUB_OUTPUT}"

      - name: Compute build metadata
        id: buildmeta
        run: |
          echo "date=$(date -u +%Y.%m.%d)" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${GITHUB_SHA::8}" >> "${GITHUB_OUTPUT}"

      - name: Decide whether to build
        id: decision
        env:
          TRIGGER:   ${{ github.event_name }}
          FORCE:     ${{ inputs.force_rebuild }}
          UPSTREAM:  ${{ steps.openclaw.outputs.version }}
          CURRENT:   ${{ steps.quay.outputs.current }}
        run: |
          if [[ "${TRIGGER}" != "schedule" ]]; then
            echo "Trigger is '${TRIGGER}' — building unconditionally."
            echo "should_build=true" >> "${GITHUB_OUTPUT}"
          elif [[ "${FORCE}" == "true" ]]; then
            echo "Force rebuild requested."
            echo "should_build=true" >> "${GITHUB_OUTPUT}"
          elif [[ "${UPSTREAM}" != "${CURRENT}" ]]; then
            echo "OpenClaw version changed: ${CURRENT} → ${UPSTREAM}"
            echo "should_build=true" >> "${GITHUB_OUTPUT}"
          else
            echo "Upstream OpenClaw is still ${CURRENT}. No rebuild needed."
            echo "should_build=false" >> "${GITHUB_OUTPUT}"
          fi

  # =========================================================================
  # JOB 2 — Build agentic base image (amd64 + arm64)
  # =========================================================================
  base:
    name: "base-${{ matrix.arch }} — Build${{ github.event_name != 'pull_request' && ' & Push' || ' (PR check)' }}"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    needs: upstream
    if: needs.upstream.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Compute base tags
        id: base_tags
        run: |
          BASE="${{ env.BASE_IMAGE_REF }}"
          ARCH="${{ matrix.arch }}"
          DATE="${{ needs.upstream.outputs.build_date }}"
          SHA="${{ needs.upstream.outputs.short_sha }}"
          {
            echo "tags<<EOF"
            echo "${BASE}:base-${ARCH}-${DATE}"
            echo "${BASE}:base-${ARCH}-git-${SHA}"
            if [[ "${{ github.ref }}" == "refs/heads/main" ]] || \
               [[ "${{ github.event_name }}" == "schedule" ]]; then
              echo "${BASE}:base-${ARCH}-latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build base image
        id: build
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2
        with:
          image: openshell
          tags: ${{ steps.base_tags.outputs.tags }}
          containerfiles: ./base/Containerfile
          context: ./base/context
          platforms: ${{ matrix.platform }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ needs.upstream.outputs.build_date }}

      - name: Push base image
        if: github.event_name != 'pull_request'
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2
        with:
          image: ${{ steps.build.outputs.image }}
          tags: ${{ steps.build.outputs.tags }}
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

  # =========================================================================
  # JOB 3 — Build CSB OpenClaw image (amd64 + arm64)
  # =========================================================================
  build:
    name: "csb-${{ matrix.arch }} — Build${{ github.event_name != 'pull_request' && ' & Push' || ' (PR check)' }}"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    needs: [upstream, base]
    if: needs.upstream.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Free runner disk space
        run: |
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/local/share/chromium \
            /usr/local/share/powershell \
            /usr/share/dotnet \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune -af 2>/dev/null || true

      - name: Compute tags
        id: meta
        env:
          OC_VERSION: ${{ needs.upstream.outputs.openclaw_version }}
          OC_REF:     ${{ inputs.openclaw_ref || needs.upstream.outputs.openclaw_version || 'main' }}
        run: |
          SHORT_SHA="${{ needs.upstream.outputs.short_sha }}"
          DATE="${{ needs.upstream.outputs.build_date }}"
          BASE="${{ env.CSB_IMAGE_REF }}"
          PREFIX="csb-${{ matrix.arch }}-"

          # Only push latest/version tags from main with no ref override.
          # Manual dispatch with openclaw_ref builds a specific ref — don't
          # tag it as latest or with the upstream release version.
          REF_OVERRIDE="${{ inputs.openclaw_ref }}"
          PUSH_LATEST=false
          if [[ -z "${REF_OVERRIDE}" ]] && \
             { [[ "${{ github.ref }}" == "refs/heads/main" ]] || \
               [[ "${{ github.event_name }}" == "schedule" ]]; }; then
            PUSH_LATEST=true
          fi

          PUSH_OC_VERSION=false
          if [[ -z "${REF_OVERRIDE}" ]] && \
             [[ "${OC_VERSION}" != "unknown" && -n "${OC_VERSION}" ]]; then
            PUSH_OC_VERSION=true
          fi

          {
            echo "tags<<EOF"
            echo "${BASE}:${PREFIX}${DATE}"
            echo "${BASE}:${PREFIX}git-${SHORT_SHA}"
            [[ "${PUSH_LATEST}"      == "true" ]] && echo "${BASE}:${PREFIX}latest"
            [[ "${PUSH_OC_VERSION}"  == "true" ]] && echo "${BASE}:${PREFIX}openclaw-${OC_VERSION}"
            echo "EOF"
            echo "short_sha=${SHORT_SHA}"
            echo "date=${DATE}"
            echo "oc_version=${OC_VERSION}"
            echo "oc_ref=${OC_REF}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build CSB image
        id: build
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2
        with:
          image: openclaw
          tags: ${{ steps.meta.outputs.tags }}
          containerfiles: ./csb/Containerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            OPENCLAW_REF=${{ steps.meta.outputs.oc_ref }}
            CSB_BASE_IMAGE=${{ env.BASE_IMAGE_REF }}:base-${{ matrix.arch }}-latest
            OPENCLAW_EXTENSIONS=${{ inputs.openclaw_extensions || '' }}
          extra-args: --log-level=debug
          labels: |
            org.opencontainers.image.title=OpenClaw CSB
            org.opencontainers.image.description=OpenClaw CSB (naked claw) — ${{ matrix.arch }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.oc_version }}
            org.opencontainers.image.created=${{ steps.meta.outputs.date }}
            org.opencontainers.image.licenses=MIT
            maintainer=Ryan Nix <ryan.nix@gmail.com>
            io.openshift.expose-services=18789:http
            io.openshift.tags=ai,agent,nodejs,csb

      - name: Push to Quay.io
        id: push
        if: github.event_name != 'pull_request'
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2
        with:
          image: ${{ steps.build.outputs.image }}
          tags: ${{ steps.build.outputs.tags }}
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      # --- Trivy + SBOM (same as before) ---
      - name: Install Trivy
        if: github.event_name != 'pull_request'
        env:
          TRIVY_VERSION: "0.72.0"
        run: |
          ARCH=$(uname -m)
          case "${ARCH}" in
            x86_64)  TRIVY_ARCH="Linux-64bit" ;;
            aarch64) TRIVY_ARCH="Linux-ARM64" ;;
          esac
          curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_${TRIVY_ARCH}.tar.gz" \
            -o trivy.tar.gz
          tar xzf trivy.tar.gz -C /usr/local/bin trivy
          rm trivy.tar.gz

      - name: Trivy scan
        id: trivy
        if: github.event_name != 'pull_request'
        run: |
          IMAGE_DIGEST="${{ env.CSB_IMAGE_REF }}@${{ steps.push.outputs.digest }}"
          OUT="trivy"
          mkdir -p "${OUT}"
          trivy image --format json --output "${OUT}/csb-${{ matrix.arch }}-trivy.json" "${IMAGE_DIGEST}" || true
          trivy image --format sarif --output "${OUT}/csb-${{ matrix.arch }}-trivy.sarif" "${IMAGE_DIGEST}" || true
          echo "trivy_dir=${OUT}" >> "${GITHUB_OUTPUT}"

      - name: Upload Trivy report
        if: github.event_name != 'pull_request' && always() && steps.trivy.outputs.trivy_dir != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: trivy-csb-${{ matrix.arch }}
          path: ${{ steps.trivy.outputs.trivy_dir }}/
          if-no-files-found: error
          retention-days: 90

      - name: Trivy CRITICAL gate
        if: github.event_name != 'pull_request'
        run: |
          IMAGE_DIGEST="${{ env.CSB_IMAGE_REF }}@${{ steps.push.outputs.digest }}"
          trivy image --severity CRITICAL --exit-code 1 "${IMAGE_DIGEST}"

      - name: Install syft
        if: github.event_name != 'pull_request'
        env:
          SYFT_VERSION: "1.46.0"
        run: |
          ARCH=$(uname -m)
          case "${ARCH}" in
            x86_64)  SYFT_ARCH="amd64" ;;
            aarch64) SYFT_ARCH="arm64" ;;
          esac
          curl -sSfL "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_${SYFT_ARCH}.tar.gz" \
            -o syft.tar.gz
          tar xzf syft.tar.gz -C /usr/local/bin syft
          rm syft.tar.gz

      - name: Generate SBOMs
        id: sbom
        if: github.event_name != 'pull_request'
        run: |
          IMAGE_DIGEST="${{ env.CSB_IMAGE_REF }}@${{ steps.push.outputs.digest }}"
          OUT="sbom"
          mkdir -p "${OUT}"
          syft "${IMAGE_DIGEST}" -o spdx-json > "${OUT}/csb-${{ matrix.arch }}-sbom.spdx.json"
          syft "${IMAGE_DIGEST}" -o cyclonedx-json > "${OUT}/csb-${{ matrix.arch }}-sbom.cyclonedx.json"
          echo "sbom_dir=${OUT}" >> "${GITHUB_OUTPUT}"

      - name: Upload SBOMs
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-csb-${{ matrix.arch }}
          path: ${{ steps.sbom.outputs.sbom_dir }}/
          retention-days: 90

  # =========================================================================
  # JOB 4 — Multi-arch manifests
  # =========================================================================
  manifest:
    name: Create multi-arch manifests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [upstream, build]
    if: github.event_name != 'pull_request' && needs.upstream.outputs.should_build == 'true'

    steps:
      - name: Log in to Quay.io
        env:
          QUAY_USER: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASS: ${{ secrets.QUAY_PASSWORD }}
        run: |
          echo "${QUAY_PASS}" | podman login -u "${QUAY_USER}" --password-stdin quay.io

      - name: Create manifests
        env:
          BASE: ${{ env.BASE_IMAGE_REF }}
          CSB: ${{ env.CSB_IMAGE_REF }}
          DATE: ${{ needs.upstream.outputs.build_date }}
          SHORT_SHA: ${{ needs.upstream.outputs.short_sha }}
          OC_VERSION: ${{ needs.upstream.outputs.openclaw_version }}
        run: |
          create_manifest() {
            local REPO="$1" SUFFIX="$2" PREFIX="$3"
            echo "Creating manifest: ${REPO}:${PREFIX}${SUFFIX}"
            podman manifest create "${REPO}:${PREFIX}${SUFFIX}" \
              "${REPO}:${PREFIX}amd64-${SUFFIX}" \
              "${REPO}:${PREFIX}arm64-${SUFFIX}"
            podman manifest push "${REPO}:${PREFIX}${SUFFIX}" "docker://${REPO}:${PREFIX}${SUFFIX}"
          }

          # Base image manifests
          create_manifest "${BASE}" "${DATE}" "base-"
          create_manifest "${BASE}" "git-${SHORT_SHA}" "base-"
          create_manifest "${BASE}" "latest" "base-"

          # CSB image manifests
          create_manifest "${CSB}" "${DATE}" "csb-"
          create_manifest "${CSB}" "git-${SHORT_SHA}" "csb-"

          if [[ "${{ github.ref }}" == "refs/heads/main" ]] || \
             [[ "${{ github.event_name }}" == "schedule" ]]; then
            create_manifest "${CSB}" "latest" "csb-"
          fi

          if [[ "${OC_VERSION}" != "unknown" && -n "${OC_VERSION}" ]]; then
            create_manifest "${CSB}" "openclaw-${OC_VERSION}" "csb-"
          fi
